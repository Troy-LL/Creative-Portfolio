name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  deploy-sanity:
    name: deploy-sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Build Founders Cafe into assets
        run: npm run build
      - name: Assert deploy artifacts
        run: |
          test -f index.html
          test -f assets/js/app.js
          test -f vercel.json
          node -e "JSON.parse(require('fs').readFileSync('vercel.json','utf8'))"
          test -d assets/founders-cafe
          find assets/founders-cafe -type f | head
          test -n "$(find assets/founders-cafe -type f | head -1)"

  e2e:
    name: e2e
    needs: deploy-sanity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install
        run: npm ci
      - name: Build Founders Cafe
        run: npm run build
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run Playwright
        run: npx playwright test
      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
            docs/testing/proof/
          if-no-files-found: ignore
